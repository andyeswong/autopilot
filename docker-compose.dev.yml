version: '3.8'

services:
  mysql:
    image: mysql:8.0
    hostname: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-auto_inspector}
      MYSQL_USER: ${DB_USER:-auto_inspector}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  playwright:
    build:
      context: ./playwright-server
      dockerfile: Dockerfile.dev
    ports:
      - "5900:5900"       # VNC port for remote display
      - "6080:6080"       # noVNC Web UI
      - "9222:9222"       # WebSocket endpoint for Playwright
    hostname: playwright
    environment:
      - DISPLAY=:99
    volumes:
      - ./playwright-server:/app

  backend:
    depends_on:
      mysql:
        condition: service_healthy
      playwright:
        condition: service_started
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    hostname: backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OLLAMAHOST=${OLLAMAHOST:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2-vision:11b}
      - PLAYWRIGHT_WS_ENDPOINT=ws://playwright:9222/ws-endpoint
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-auto_inspector}
      - DB_USER=${DB_USER:-auto_inspector}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:3000"
    hostname: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql-data:
